<div class="register-container">
  <h2>Register</h2>
  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" [(ngModel)]="user.username" required />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="user.email" required />
    </div>
    <div class="form-group">
      <label for="dob">Date of Birth</label>
      <input id="dob" name="dob" type="date" [(ngModel)]="user.dob" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" [(ngModel)]="user.password" required />
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" name="confirmPassword" type="password" [(ngModel)]="user.confirmPassword" required />
    </div>
    <p class="error" *ngIf="user.password && user.confirmPassword && user.password !== user.confirmPassword">Passwords do not match</p>
    <button type="submit" [disabled]="!registerForm.valid || user.password !== user.confirmPassword">Register</button>
  </form>
</div>
